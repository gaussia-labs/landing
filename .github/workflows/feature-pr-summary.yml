name: Gaussia landing — auto PR summary (feature → develop)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr_summary:
    # Skip the release PR (develop -> master goes through its own workflow)
    if: github.event.pull_request.head.ref != 'master'
    runs-on: ubuntu-latest

    steps:
      - name: Build Gaussia landing PR summary and update body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const compare = await github.rest.repos.compareCommits({
              owner,
              repo,
              base: pr.base.sha,
              head: pr.head.sha,
              per_page: 250,
            });

            const commits = (compare.data.commits || [])
              .map(c => (c.commit?.message ? c.commit.message.split("\n")[0].trim() : ""))
              .filter(Boolean);

            const rx = /^(feat|fix|task|docs|style|refactor|perf|test|ci|chore)(?:\(([^)]+)\))?(!)?: (.+)$/;

            const buckets = {
              feat: [], fix: [], task: [], perf: [], refactor: [],
              docs: [], test: [], ci: [], chore: [], style: [], other: [],
            };

            for (const s of commits) {
              const m = s.match(rx);
              if (!m) { buckets.other.push(s); continue; }
              const [, type, scope, bang, desc] = m;
              let line = desc.trim();
              if (scope) line = `**${scope}**: ${line}`;
              if (bang) line += " _(BREAKING)_";
              buckets[type].push(line);
            }

            const order = [
              ["feat",     "✨ Landing features"],
              ["fix",      "🛠 Fixes"],
              ["task",     "🔧 Landing tasks"],
              ["perf",     "⚡ Performance"],
              ["refactor", "♻️ Refactors"],
              ["docs",     "📝 Docs & copy"],
              ["test",     "✅ Tests"],
              ["ci",       "🤖 CI"],
              ["chore",    "🧹 Chores"],
              ["style",    "🎨 Style"],
              ["other",    "📦 Other"],
            ];

            let md = `## 📋 Gaussia landing — PR summary\n\n`;
            let any = false;
            for (const [k, title] of order) {
              const items = buckets[k];
              if (!items.length) continue;
              any = true;
              md += `### ${title}\n` + items.map(x => `- ${x}`).join("\n") + "\n\n";
            }
            if (!any) md += `_No conventional commits detected on this branch._\n`;

            const start = "<!-- pr-summary:start -->";
            const end   = "<!-- pr-summary:end -->";
            const body  = pr.body || "";

            let newBody;
            if (body.includes(start) && body.includes(end)) {
              const before = body.split(start)[0] + start;
              const after  = body.split(end)[1];
              newBody = `${before}\n\n${md.trim()}\n\n${end}${after}`;
            } else {
              newBody = `${start}\n\n${md.trim()}\n\n${end}\n` + (body ? `\n${body}` : "");
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body: newBody,
            });
